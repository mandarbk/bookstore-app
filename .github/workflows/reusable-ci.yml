name: Reusable Build and Manifest Update

on:
  workflow_call:
    inputs:
      service-name: { type: string, required: true }
      context-path: { type: string, required: true }
    secrets:
      GIT_PAT: { required: true }
      DOCKER_USERNAME: { required: true }
      DOCKER_PASSWORD: { required: true }

env:
  DOCKER_REGISTRY: index.docker.io # Update with your registry
  IMAGE_NAME:  ${{ inputs.service-name }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test (Reactor)
        run: mvn clean install -pl ${{ inputs.service-name }} -am -DskipTests

#      - name: Run Unit Tests
#        run: mvn test

  docker-build-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context-path }}
          file: ./Dockerfile # Path to your multi-stage Dockerfile
          push: true
          # Tags the image with the git commit hash for traceability
          #tags: ${{ env.DOCKER_REGISTRY }}/${{ inputs.service-name }}:${{ github.sha }}
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ github.sha }}

