name: Reusable Build and Manifest Update

on:
  workflow_call:
    inputs:
      service-name: { type: string, required: true }
      context-path: { type: string, required: true }
    secrets:
      GIT_PAT: { required: true }
      DOCKER_USERNAME: { required: true }
      DOCKER_PASSWORD: { required: true }

env:
  DOCKER_REGISTRY: ghcr.io # Update with your registry
  IMAGE_NAME: ${{ github.repository_owner }}/${{ inputs.service-name }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write  # <--- This gives the GITHUB_TOKEN the power to push images
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test (Reactor)
        run: mvn clean install -pl ${{ inputs.service-name }} -am -DskipTests

#      - name: Run Unit Tests
#        run: mvn test

      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
#          username: ${{ secrets.DOCKER_USERNAME }}
#          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context-path }}
          file: ${{ inputs.context-path }}/Dockerfile
          push: true
          # Tags the image with the git commit hash for traceability
          # tags: ${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}:${{ github.sha }}
          tags: |
            ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ env.IMAGE_NAME }}:latest

