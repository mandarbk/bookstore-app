# resilience4j:
#   timelimiter:
#     configs:
#       default:
#         timeout-duration: 5s

# # maxAttempts: 5: 
# # The system will attempt the operation up to 5 times total (1 initial call + 4 retries).
# # enable-exponential-backoff: true: 
# #   Instead of waiting a fixed amount of time between retries, the wait time increases exponentially after each failure. This prevents overwhelming a struggling downstream service (often referred to as avoiding the "thundering herd" problem).  
# # enable-randomized-wait: true: 
# #   Adds "jitter" (randomness) to the wait duration. This prevents multiple client instances from retrying at the exact same time, which further reduces the risk of traffic spikes.  
# # exponential-max-wait-duration: 2s: 
# #   The exponential increase is capped at 2 seconds. The wait time will grow until it hits this limit, ensuring the system doesn't wait indefinitely for a retry.
# # waitDuration: 500ms: 
# #   The initial wait time before the first retry attempt.  
# # retryExceptions: 
# #   The retry logic will only trigger if the operation throws one of these specific 
# #   exceptions:
# #   feign.FeignException.ServiceUnavailable (typically an HTTP 503 error)
# #   java.io.IOException (general network or I/O failures)
# # ignoreExceptions: 
# #   The system will never retry if this exception is thrown:io.github.resilience4j.circuitbreaker.CallNotPermittedException (this occurs when the circuit breaker is already open; retrying would be futile as the downstream service is explicitly being blocked).       
# # exponential-backoff-multiplier: 2.0  # The wait time doubles each attempt 
# # By setting the multiplier to 2.0, your wait durations between attempts will now follow this progression (before randomized jitter is applied)
# # Attempt 1 (Failure) -> Wait 500ms
# # Attempt 2 (Failure) -> Wait 1000ms ($500ms \times 2.0$)
# # Attempt 3 (Failure) -> Wait 2000ms ($1000ms \times 2.0$)
# # Attempt 4 (Failure) -> Wait 2000ms (Capped by exponential-max-wait-duration)
#   retry:
#     configs:
#       default:
#         maxAttempts: 5
#         enable-exponential-backoff: true
#         enable-randomized-wait: true
#         exponential-max-wait-duration: 3s
#         exponential-backoff-multiplier: 2.0
#         waitDuration: 500ms
#         ignoreExceptions:
#           - io.github.resilience4j.circuitbreaker.CallNotPermittedException
#     instances:
#       cartServiceClient:
#         base-config: default
#       orderServiceClient:
#         base-config: default


# # registerHealthIndicator: true: 
# #   Exposes the circuit breaker status through the Spring Boot Actuator /health endpoint, allowing you to monitor it in real-time.
# # sliding-window-type: COUNT_BASED: 
# #   The circuit breaker evaluates success/failure rates based on a fixed number of calls, rather than a time window.  
# # slidingWindowSize: 10: 
# #   It keeps track of the last 10 calls to calculate the failure rate.  
# # minimumNumberOfCalls: 5: 
# #   The circuit will not calculate a failure rate until at least 5 calls have been recorded. 
# #   This prevents premature tripping due to a small sample size.  
# # failureRateThreshold: 50: 
# #   If 50% or more of the calls in the window fail, the circuit trips to OPEN.
# # waitDurationInOpenState: 5s: 
# #   Once OPEN, the circuit stays shut for 5 seconds, rejecting all calls immediately (fail-fast).
# # automaticTransitionFromOpenToHalfOpenEnabled: true: 
# #   After the 5-second wait, the circuit automatically enters the HALF_OPEN state.  
# # permittedNumberOfCallsInHalfOpenState: 2: 
# #   While in HALF_OPEN, it allows 2 test calls. If those calls succeed, the circuit closes; if they fail, it re-opens.  
# # eventConsumerBufferSize: 10: 
# #   Keeps a buffer of the last 10 events (state transitions, errors, etc.) in memory for monitoring or logging purposes.
      
#   circuitbreaker:
#     configs:
#       default:
#         registerHealthIndicator: true
#         sliding-window-type: COUNT_BASED
#         slidingWindowSize: 10
#         minimumNumberOfCalls: 5
#         permittedNumberOfCallsInHalfOpenState: 2
#         automaticTransitionFromOpenToHalfOpenEnabled: true
#         waitDurationInOpenState: 5s
#         failureRateThreshold: 50
#         eventConsumerBufferSize: 10
